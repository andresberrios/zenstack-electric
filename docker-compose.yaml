name: zenstack-electric

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: zenstack-electric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres]
      interval: 5s
      timeout: 5s
      retries: 5

  electric:
    image: docker.io/electricsql/electric:1.4.12
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/zenstack-electric?sslmode=disable
      # Not suitable for production. Only use insecure mode in development or if you've otherwise secured the Electric API.
      # See https://electric-sql.com/docs/guides/security
      ELECTRIC_INSECURE: true
      ELECTRIC_FEATURE_FLAGS: allow_subqueries,tagged_subqueries
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
